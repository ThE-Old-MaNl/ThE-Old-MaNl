<svg fill="none" viewBox="0 0 850 160" width="850" height="160" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }

        .syslog {
          width: 850px;
          height: 160px;
          background: #0D1117;
          border: 1px solid #30363d;
          border-radius: 8px;
          font-family: 'Courier New', Courier, monospace;
          color: #c9d1d9;
          position: relative;
          overflow: hidden;
        }

        /* ── Header bar ── */
        .syslog-hdr {
          padding: 10px 20px;
          background: #161b22;
          border-bottom: 1px solid #30363d;
          display: flex;
          align-items: center;
          justify-content: space-between;
        }

        .syslog-title {
          font-size: 11px;
          letter-spacing: 2px;
          text-transform: uppercase;
          color: #ff1744;
        }

        .syslog-status {
          font-size: 10px;
          color: #39D353;
          animation: pulse 2s infinite;
        }

        @keyframes pulse {
          0%, 100% { opacity: 1; }
          50%      { opacity: 0.4; }
        }

        /* ── Ticker viewport ── */
        .ticker-viewport {
          height: 66px;
          overflow: hidden;
          position: relative;
          margin: 10px 20px 0 20px;
        }

        .ticker-fade {
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background: linear-gradient(
            to bottom,
            #0D1117 0%,
            transparent 18%,
            transparent 82%,
            #0D1117 100%
          );
          pointer-events: none;
          z-index: 2;
        }

        .ticker-scroll {
          animation: tickerMove 18s linear infinite;
        }

        @keyframes tickerMove {
          0%   { transform: translateY(0); }
          100% { transform: translateY(-50%); }
        }

        /* ── Log lines ── */
        .log-line {
          height: 22px;
          line-height: 22px;
          font-size: 11px;
          white-space: nowrap;
          display: flex;
          align-items: center;
        }

        .log-time {
          color: #8b949e;
          margin-right: 6px;
        }

        .log-tag {
          font-weight: bold;
          margin-right: 6px;
          font-size: 10px;
        }

        .tag-audit    { color: #39D353; }
        .tag-siem     { color: #ffab00; }
        .tag-ids      { color: #ff1744; }
        .tag-firewall { color: #ff1744; }
        .tag-opsec    { color: #58a6ff; }
        .tag-soc      { color: #39D353; }

        .log-msg {
          color: #c9d1d9;
          margin-right: 4px;
        }

        .log-dots {
          color: #30363d;
          margin-right: 4px;
        }

        .log-status {
          font-weight: bold;
          font-size: 10px;
        }

        .status-ok    { color: #39D353; }
        .status-alert { color: #ffab00; }
        .status-block { color: #ff1744; }

        /* ── Bottom signal line ── */
        .sig-bottom {
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 6px;
          padding: 8px 0;
          border-top: 1px solid #21262d;
          margin: 6px 20px 0 20px;
        }

        .sig-dash {
          width: 14px;
          height: 1px;
          background: #30363d;
        }

        .sig-wave {
          color: #ff1744;
          font-size: 10px;
          animation: wave 2s infinite;
        }

        @keyframes wave {
          0%, 100% { opacity: 1; }
          50%      { opacity: 0.3; }
        }

        .sig-txt {
          font-size: 8px;
          letter-spacing: 3px;
          text-transform: uppercase;
          color: #ff1744;
          animation: flicker 5s infinite;
        }

        @keyframes flicker {
          0%, 93%, 95%, 97%, 100% { opacity: 1; }
          94%                     { opacity: 0.2; }
          96%                     { opacity: 0.8; }
          98%                     { opacity: 0.3; }
        }

        /* ── Top glow ── */
        .glow {
          position: absolute;
          top: 0;
          left: 50%;
          transform: translateX(-50%);
          width: 200px;
          height: 1px;
          background: linear-gradient(90deg, transparent, #ff1744, transparent);
          animation: gpulse 3s infinite;
        }

        @keyframes gpulse {
          0%, 100% { opacity: 0.3; width: 200px; }
          50%      { opacity: 1;   width: 400px; }
        }

        /* ── Accessibility ── */
        @media (prefers-reduced-motion: reduce) {
          * { animation: none !important; }
        }
      </style>

      <div class="syslog">
        <div class="glow"></div>

        <div class="syslog-hdr">
          <span class="syslog-title">&#x25C9; live security audit log</span>
          <span class="syslog-status">&#x25CF; MONITORING</span>
        </div>

        <div class="ticker-viewport">
          <div class="ticker-fade"></div>
          <div class="ticker-scroll">
            <!-- Set 1 -->
            <div class="log-line">
              <span class="log-time">[15:42:01]</span>
              <span class="log-tag tag-audit">[AUDIT]&#160;&#160;&#160;</span>
              <span class="log-msg">Sentinel heartbeat check</span>
              <span class="log-dots">..................</span>
              <span class="log-status status-ok">NORMAL</span>
            </div>
            <div class="log-line">
              <span class="log-time">[15:42:03]</span>
              <span class="log-tag tag-siem">[SIEM]&#160;&#160;&#160;&#160;</span>
              <span class="log-msg">KQL rule 4625-BF triggered</span>
              <span class="log-dots">...............</span>
              <span class="log-status status-alert">ALERT</span>
            </div>
            <div class="log-line">
              <span class="log-time">[15:42:05]</span>
              <span class="log-tag tag-ids">[IDS]&#160;&#160;&#160;&#160;&#160;</span>
              <span class="log-msg">Inbound port scan dropped on eth0</span>
              <span class="log-dots">........</span>
              <span class="log-status status-block">BLOCKED</span>
            </div>
            <div class="log-line">
              <span class="log-time">[15:42:07]</span>
              <span class="log-tag tag-firewall">[FIREWALL]</span>
              <span class="log-msg">NSG-Rule-04 deny action executed</span>
              <span class="log-dots">.........</span>
              <span class="log-status status-block">ENFORCED</span>
            </div>
            <div class="log-line">
              <span class="log-time">[15:42:09]</span>
              <span class="log-tag tag-opsec">[OPSEC]&#160;&#160;&#160;</span>
              <span class="log-msg">GPG key rotation verified</span>
              <span class="log-dots">................</span>
              <span class="log-status status-ok">PASS</span>
            </div>
            <div class="log-line">
              <span class="log-time">[15:42:11]</span>
              <span class="log-tag tag-soc">[SOC]&#160;&#160;&#160;&#160;&#160;</span>
              <span class="log-msg">Incident triage queue status</span>
              <span class="log-dots">..............</span>
              <span class="log-status status-ok">CLEAR</span>
            </div>
            <!-- Set 2 (duplicate for seamless loop) -->
            <div class="log-line">
              <span class="log-time">[15:42:01]</span>
              <span class="log-tag tag-audit">[AUDIT]&#160;&#160;&#160;</span>
              <span class="log-msg">Sentinel heartbeat check</span>
              <span class="log-dots">..................</span>
              <span class="log-status status-ok">NORMAL</span>
            </div>
            <div class="log-line">
              <span class="log-time">[15:42:03]</span>
              <span class="log-tag tag-siem">[SIEM]&#160;&#160;&#160;&#160;</span>
              <span class="log-msg">KQL rule 4625-BF triggered</span>
              <span class="log-dots">...............</span>
              <span class="log-status status-alert">ALERT</span>
            </div>
            <div class="log-line">
              <span class="log-time">[15:42:05]</span>
              <span class="log-tag tag-ids">[IDS]&#160;&#160;&#160;&#160;&#160;</span>
              <span class="log-msg">Inbound port scan dropped on eth0</span>
              <span class="log-dots">........</span>
              <span class="log-status status-block">BLOCKED</span>
            </div>
            <div class="log-line">
              <span class="log-time">[15:42:07]</span>
              <span class="log-tag tag-firewall">[FIREWALL]</span>
              <span class="log-msg">NSG-Rule-04 deny action executed</span>
              <span class="log-dots">.........</span>
              <span class="log-status status-block">ENFORCED</span>
            </div>
            <div class="log-line">
              <span class="log-time">[15:42:09]</span>
              <span class="log-tag tag-opsec">[OPSEC]&#160;&#160;&#160;</span>
              <span class="log-msg">GPG key rotation verified</span>
              <span class="log-dots">................</span>
              <span class="log-status status-ok">PASS</span>
            </div>
            <div class="log-line">
              <span class="log-time">[15:42:11]</span>
              <span class="log-tag tag-soc">[SOC]&#160;&#160;&#160;&#160;&#160;</span>
              <span class="log-msg">Incident triage queue status</span>
              <span class="log-dots">..............</span>
              <span class="log-status status-ok">CLEAR</span>
            </div>
          </div>
        </div>

        <div class="sig-bottom">
          <div class="sig-dash"></div>
          <div class="sig-dash"></div>
          <span class="sig-wave">&#x2584;&#x2580;&#x2584;&#x2580;&#x2584;</span>
          <div class="sig-dash"></div>
          <span class="sig-txt">signal encrypted</span>
          <div class="sig-dash"></div>
          <span class="sig-wave">&#x2584;&#x2580;&#x2584;&#x2580;&#x2584;</span>
          <div class="sig-dash"></div>
          <div class="sig-dash"></div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
